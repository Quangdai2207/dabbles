<section class="space-y-10" id="portal-user-details">

    <div>
        <h2 class="text-2xl font-bold text-white">User Details</h2>
        <p class="text-gray-400 text-sm">Read-only access</p>
    </div>

    <div class="grid grid-cols-2 gap-8">

        <!-- PERSONAL INFO -->
        <div class="space-y-6 bg-gray-900 p-6 rounded-xl border border-gray-800">
            <h3 class="text-lg font-semibold text-white mb-4">Personal Information</h3>

            <div>
                <label class="text-gray-400 text-sm">Email</label>
                <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="email">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-400 text-sm">First Name</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="firstname">
                </div>
                <div>
                    <label class="text-gray-400 text-sm">Last Name</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="lastname">
                </div>
            </div>

            <div>
                <label class="text-gray-400 text-sm">Phone</label>
                <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="phone">
            </div>

            <div>
                <label class="text-gray-400 text-sm">Date of Birth</label>
                <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="dob">
            </div>
        </div>

        <!-- ADDRESS & SYSTEM -->
        <div class="space-y-6 bg-gray-900 p-6 rounded-xl border border-gray-800">
            <h3 class="text-lg font-semibold text-white mb-4">Address & System</h3>

            <div>
                <label class="text-gray-400 text-sm">Address</label>
                <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="address">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-400 text-sm">City</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="city">
                </div>

                <div>
                    <label class="text-gray-400 text-sm">State</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="state">
                </div>
            </div>

            <div>
                <label class="text-gray-400 text-sm">Role</label>
                <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-300 rounded-lg" id="role_id">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <div>
                    <label class="text-gray-400 text-sm">Created At</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-500 rounded-lg" id="created_at">
                </div>

                <div>
                    <label class="text-gray-400 text-sm">Updated At</label>
                    <input disabled class="w-full mt-1 px-3 py-2 bg-gray-800 text-gray-500 rounded-lg" id="updated_at">
                </div>
            </div>

        </div>
    </div>
</section>
