<section id="section-image-page" class="space-y-8">
    <div id="image-error-line"
         class="hidden rounded-lg border border-red-500 bg-red-50 dark:bg-red-950
                            text-red-700 dark:text-red-400 p-3 text-sm font-medium mb-5">
    </div>
    <!-- ====== PAGE HEADER ====== -->
    <header class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow">

        <div class="flex flex-wrap justify-between gap-6">
            <div>
                <h2 class="text-xl font-semibold text-white">Images Management</h2>
                <p class="text-sm text-gray-400 mt-1">
                    Super Admin · Monitor & Control all images
                </p>
            </div>
            <div class="flex gap-2">
                <button id="btn-image-upload-page"
                        class="inline-flex items-center px-4 py-2 rounded-xl cursor-pointer
                        bg-blue-500/15 hover:bg-blue-700/15 border border-blue-400/40 text-blue-300
                            text-[12px] hover:text-blue-400 font-semibold tracking-wide select-none transition">
                    New Up
                </button>
                <button id="btn-image-refresh-page"
                        class="cursor-pointer px-4 py-2 rounded-xl bg-lime-500 hover:bg-lime-600 text-lime-900 font-semibold text-sm">
                    Refresh All
                </button>
            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400">Total Images</p>
                <p id="section-img-stat-total" class="text-2xl font-semibold text-white">0</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400">Public</p>
                <p id="section-img-stat-public" class="text-2xl font-semibold text-green-400">0</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400">Private</p>
                <p id="section-img-stat-private" class="text-2xl font-semibold text-gray-300">0</p>
            </div>

            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400">Total Price</p>
                <p id="section-img-stat-price" class="text-2xl font-semibold text-pink-400">0</p>
            </div>
        </div>
    </header>

    <!-- ====== TOOLBAR ====== -->
    <div class="bg-gray-950 p-0 space-y-3">
        <div class="flex flex-wrap gap-3 items-center justify-between">
            <div class="flex flex-wrap gap-3">

                <input id="image-details-search-input"
                       type="text"
                       placeholder="Search by title, uploader…"
                       class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white w-72">

                <select id="img-filter-visibility"
                        class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white">
                    <option value="">All visibility</option>
                    <option value="1">Public</option>
                    <option value="0">Private</option>
                </select>

                <select id="img-filter-category"
                        class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white">
                    <option value="">All categories</option>
                </select>

                <select id="img-sort"
                        class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white">
                    <option value="">More filter</option>
                    <option value="1">Newest</option>
                    <option value="2">Oldest</option>
                    <option value="3">Largest size</option>
                </select>
            </div>

            <div class="flex gap-2">
                <button id="img-clear-filters"
                        class="px-4 py-2 border border-gray-700 text-sm rounded-lg bg-gray-800 hover:bg-gray-700">
                    <span class="text-sm">↺</span> Reset Filters
                </button>
            </div>
        </div>
    </div>

    <!-- ====== IMAGE GRID ====== -->
    <div
            class="max-h-[520px] overflow-y-auto relative
             [-ms-overflow-style:'none'] [scrollbar-width:none]
             [&::-webkit-scrollbar]:hidden rounded-xl"
    >
        <table class="w-full text-sm table-fixed" id="image-details-table-data">
            <!-- thead dính -->
            <thead class="bg-gray-800 text-gray-300 uppercase text-xs sticky top-0 z-10">
            <tr>
                <th class="py-3 px-3 text-left w-28">Preview</th>
                <th class="py-3 px-3 text-left w-36">Uploader</th>
                <th class="py-3 px-3 text-left w-40">Categories</th>
                <th class="py-3 px-3 text-left w-28">Sizes</th>
                <th class="py-3 px-3 text-left w-20">Price</th>
                <th class="py-3 px-3 text-left w-20">Public</th>
                <th class="py-3 px-3 text-left w-36">Created</th>
                <th class="py-3 px-3 text-center w-32">Actions</th>
            </tr>
            </thead>

            <!-- tbody sẽ cuộn -->
            <tbody id="image-table-body" class="text-gray-300">
            <!-- append rows here -->
            </tbody>
        </table>
    </div>

    <!-- ====== PAGINATION ====== -->
    <div class="flex justify-between items-center bg-gray-900 border border-gray-800 rounded-2xl p-4">
        <p id="img-page-info" class="text-xs text-gray-400">
            Page 1 / 1 — 0 results
        </p>

        <div class="flex gap-2">
            <button id="img-prev"
                    class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-lg text-xs">
                Prev
            </button>

            <button id="img-next"
                    class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-lg text-xs">
                Next
            </button>
        </div>
    </div>
</section>
