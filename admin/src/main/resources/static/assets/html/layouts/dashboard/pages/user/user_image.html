<section id="user-details-image" class="space-y-6 mt-5">

    <header id="user-details-image-header" class="space-y-5">

        <!-- OVERVIEW + ACTION -->
        <div class="flex items-start justify-between gap-8">

            <!-- STATS GRID -->
            <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 flex-1">

                <!-- Uploaded -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
                    <p class="text-xs text-gray-400">Uploaded</p>
                    <p id="user-details-upload-image-total"
                       class="text-lg font-semibold text-white">
                        -- images
                    </p>
                    <p id="user-details-upload-image-total-size"
                       class="text-xs text-gray-500">
                        -- GB
                    </p>
                </div>

                <!-- Blacklisted -->
                <div class="bg-gray-900 border border-red-900/40 rounded-xl px-4 py-3">
                    <p class="text-xs text-red-400">Blacklisted</p>
                    <p id="user-details-upload-image-delete"
                       class="text-lg font-semibold text-white">
                        --
                    </p>
                    <p id="user-details-upload-image-delete-size-total" class="text-xs text-gray-500">- -</p>
                </div>

                <!-- Downloaded -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
                    <p class="text-xs text-gray-400">Downloaded</p>
                    <p id="user-details-download-image-total"
                       class="text-lg font-semibold text-white">
                        -- images
                    </p>
                    <p id="user-details-download-image-total-size"
                       class="text-xs text-gray-500">
                        -- GB
                    </p>
                </div>

                <!-- Visibility -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
                    <p class="text-xs text-gray-400 mb-1">Visibility</p>
                    <div class="flex items-center gap-2">
                        <span id="user-details-public-image-total"
                              class="text-lg font-semibold text-green-400">--</span>
                        <span class="text-gray-600">/</span>
                        <span id="user-details-private-image-total"
                              class="text-lg font-semibold text-yellow-400">--</span>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-1">Public / Private</p>
                </div>

                <!-- Last image -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
                    <p class="text-xs text-gray-400">Last image</p>
                    <p id="user-details-lastest-upload-image"
                       class="text-sm text-white truncate">
                        --
                    </p>
                </div>

            </div>

            <!-- SOURCE SWITCH -->
            <div class="flex flex-col gap-1 shrink-0">
                <button id="user-details-btn-upload"
                        class="px-2 py-1 rounded-sm text-[10px] uppercase font-semibold cursor-pointer
                               border border-purple-300 text-purple-300 hover:bg-purple-950 hover:text-white">
                    Uploaded
                </button>

                <button id="user-details-btn-download"
                        class="px-2 py-1 rounded-sm text-[10px] uppercase font-semibold cursor-pointer
                               border border-lime-500 text-lime-500 hover:bg-lime-950 hover:text-white">
                    Downloaded
                </button>
                <button id="user-details-btn-reload"
                        class="inline-flex items-center gap-2
                           px-2 py-1.5 cursor-pointer mt-2
                           rounded-sm
                           bg-lime-500 text-lime-950 font-semibold
                           shadow-md
                           hover:bg-lime-600 hover:shadow-lg
                           active:scale-95
                           transition-all duration-200">
                    <span class="text-lg leading-none">⟳</span>
                    <span class="text-[10px] uppercase">Reload</span>
                </button>

            </div>

        </div>
    </header>

    <!-- IMAGE CONTENT -->
    <div id="user-details-images-container" class="space-y-12">
        <!-- Append upload / download sections -->
    </div>

</section>
