<section id="category-edit-page">

    <!-- Overlay -->
    <div id="category-modal-overlay-edit"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>

    <!-- Modal -->
    <div id="category-modal-edit"
         class="fixed inset-0 z-50 flex items-center justify-center">

        <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-lg shadow-2xl">

            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
                <h2 class="text-lg font-semibold text-white">
                    Edit Category
                </h2>

                <button id="btn-close-category-edit"
                        class="text-sm leading-none rounded-xl cursor-pointer
                        px-2 py-2 font-semibold bg-red-600 text-white
                        ">
                    Close
                </button>
            </div>

            <form id="category-edit-form" class="px-6 py-5 space-y-6">

                <!-- Name -->
                <div class="space-y-1">
                    <label class="text-sm text-gray-400">Name</label>

                    <input id="cat-edit-name" type="text"
                           placeholder="Category name"
                           name="name"
                           required
                           class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white placeholder-gray-500 outline-none focus:ring-2 focus:ring-blue-600">
                </div>

                <!-- Description -->
                <div class="space-y-1">
                    <label class="text-sm text-gray-400">Description</label>

                    <textarea id="cat-edit-desc" rows="3" name="description"
                              placeholder="Short description"
                              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white placeholder-gray-500 outline-none focus:ring-2 focus:ring-blue-600"></textarea>
                </div>

                <!-- Flags -->
                <div class="grid grid-cols-2 gap-4">

                    <label class="flex items-center gap-2 px-3 py-2 rounded-xl bg-gray-800 border border-gray-700 text-sm text-gray-300">
                        <input
                                name="featured"
                                id="cat-edit-featured" type="checkbox" class="accent-blue-600">
                        Featured
                    </label>
                </div>

                <!-- Action buttons -->

                <div class="pt-4 border-t border-gray-800">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

                        <!-- Error -->
                        <div id="edit-cate-error"
                             class="hidden rounded-lg border border-red-500 bg-red-50 dark:bg-red-950
                            text-red-700 dark:text-red-400 p-3 text-sm font-medium">
                        </div>
                        <!-- Buttons -->
                        <div class="flex gap-3 justify-end">
                            <button
                                    type="button"
                                    id="btn-cancel-category-edit"
                                    class="cursor-pointer px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-sm">
                                Cancel
                            </button>
                            <button
                                    type="submit"
                                    id="btn-edit-category"
                                    class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-sm font-semibold">
                                Confirm
                            </button>
                        </div>
                    </div>
                </div>
            </form>

        </div>
    </div>

</section>
