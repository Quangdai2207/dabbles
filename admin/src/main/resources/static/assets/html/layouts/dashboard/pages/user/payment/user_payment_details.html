<section class="w-full mx-auto py-8 px-0 bg-gray-950 text-gray-100 rounded-2xl space-y-8">

    <!-- HEADER -->
    <header class="flex items-start justify-between border-b border-gray-800 pb-5">
        <div class="space-y-1">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-semibold tracking-tight">Payment Details</h1>
                <span class="text-xs text-gray-500">(internal)</span>
            </div>

            <div class="flex items-center gap-2 text-xs text-gray-400">
                <span>Payments</span>
                <span>➤</span>
                <span class="text-gray-300">Detail</span>
                <span class="text-gray-600">#</span>
                <span id="user-payment-details"
                      class="text-[11px] font-semibold text-white">
                    payment-id
                </span>
            </div>
        </div>

        <button id="btn-back-user-payment"
                class="px-4 py-2 text-sm rounded-xl border border-orange-700
                       bg-gray-950 text-white hover:bg-orange-700/10 transition">
            ← Back
        </button>
    </header>

    <!-- MAIN -->
    <div class="grid grid-cols-12 gap-6 mt-20">

        <!-- LEFT -->
        <div id="payment-scope" class="col-span-12">
            <div class="flex">

                <div class="w-1 bg-gradient-to-b from-blue-500/40 to-transparent rounded-full mr-6"></div>

                <div class="flex-1 space-y-10">

                    <!-- TRANSACTION -->
                    <div>
                        <h3 class="text-sm uppercase tracking-widest mb-4">
                            Transaction
                        </h3>

                        <div class="space-y-3 text-sm pr-2">

                            <div class="flex justify-between">
                                <span class="text-gray-400">Type</span>
                                <span id="payment-type"
                                      class="font-semibold text-gray-200">--</span>
                            </div>
                            <hr class="border-gray-800 opacity-80"/>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Created at</span>
                                <span id="payment-date"
                                      class="font-medium text-gray-300">--</span>
                            </div>
                            <hr class="border-gray-800 opacity-80"/>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Amount</span>
                                <span class="font-semibold text-gray-200">
                                    <span id="payment-amount">--</span>
                                    <span id="payment-currency"
                                          class="text-xs text-gray-400 ml-1">--</span>
                                </span>
                            </div>
                            <hr class="border-gray-800 opacity-80"/>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Gateway</span>
                                <span id="payment-method"
                                      class="font-medium text-gray-300">--</span>
                            </div>
                            <hr class="border-gray-800 opacity-80"/>
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Status</span>
                                <span id="payment-status"
                                      class="px-2 py-1 rounded-md text-xs font-semibold
                                             bg-gray-800 text-gray-200">
                                    --
                                </span>
                            </div>
                            <hr class="border-gray-800 opacity-80"/>
                        </div>
                    </div>
                    <!-- REFERENCE -->
                    <div>
                        <h3 class="text-xs uppercase tracking-widest text-gray-500 mb-4">
                            Reference
                        </h3>
                        <button id="payment-reference-object"
                                class="w-full flex items-center justify-start gap-2
                                       p-5 rounded-xl border border-dashed border-blue-500/40
                                       bg-blue-500/5 hover:bg-blue-500/10 transition">
                            <span id="payment-reference-object-value"></span>
                            <span class="italic font-medium text-gray-500"> (Click to inspector)</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div id="reference-wrapper"
             class="col-span-4 translate-x-full opacity-0
                    pointer-events-none transition-all duration-300">

            <!-- IMAGE -->
            <div id="ref-panel-image"
                 class="hidden h-full rounded-xl bg-gray-900 border border-gray-800 flex flex-col">

                <div class="px-6 py-4 border-b border-gray-800">
                    <h3 class="text-sm font-medium text-gray-200">
                        Inspector Image
                    </h3>
                </div>

                <div class="p-6 space-y-4 text-sm flex-1">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">ID</p>
                        <p id="payment-reference-type" class="font-medium">--</p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500 mb-1">Content</p>
                        <a id="ref-link-image" data-link href="">
                            <img id="payment-reference-content"
                                 class="w-16 h-16 rounded-lg border border-green-400"/>
                        </a>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500 mb-1">Uploader</p>
                        <a href="#" id="payment-reference-uploader" class="font-medium cursor-pointer">--</a>
                    </div>
                </div>
            </div>

            <!-- SUB -->
            <div id="ref-panel-sub"
                 class="hidden h-full rounded-xl bg-gray-900 border border-gray-800 flex flex-col">

                <div class="px-6 py-4 border-b border-gray-800">
                    <h3 class="text-sm font-medium text-gray-200">
                        Inspector Subscribe
                    </h3>
                </div>

                <div class="p-6 space-y-4 text-sm flex-1">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">ID:</p>
                        <span id="payment-reference-sub-id" class="text-xs font-semibold">--</span>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Duration:</p>
                        <p id="payment-reference-duration" class="font-medium">--</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Description:</p>
                        <p id="payment-sub-desc" class="font-medium">--</p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500 mb-1">Renew at:</p>
                        <div class="flex flex-col pl-15">
                            <p
                               class="font-medium">
                                <span class="text-gray-500">• Date: </span>
                                <span id="payment-sub-renew-date" class="italic">- -</span>
                            </p>
                            <p class="font-medium">
                                <span class="text-gray-500">• Time: </span>
                                <span id="payment-sub-renew-time" class="italic">- -</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
