<section
        id="user-payment-section"
        class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg space-y-6 mt-10">

    <!-- HEADER -->
    <div class="flex items-center justify-between">
        <div>
            <h2 id="payment-history" class="text-xl font-semibold text-white">Payment History</h2>
            <p class="text-sm text-gray-400">
                Track, audit and manage all user payments
            </p>
        </div>
        <div class="flex gap-3">
            <button
                    id="user-payment-btn-reload-data"
                    class="px-4 py-2 rounded-lg bg-blue-800 border border-blue-700
                   text-sm text-white  cursor-pointer hover:opacity-70">
                Refresh
            </button>
            <button
                    id="user-payment-btn-export"
                    class="px-4 py-2 rounded-lg bg-gray-800 border border-gray-700
                   text-sm text-gray-200 hover:bg-gray-700 cursor-pointer">
                Export CSV
            </button>
            <button
                    id="user-payment-btn-back"
                    class="px-4 py-2 rounded-lg bg-gray-950 border border-orange-700
                   text-sm text-gray-200 hover:opacity-80 cursor-pointer">
                Back
            </button>
        </div>
    </div>

    <!-- SUMMARY HEADER -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3 mt-10">
        <!-- TOTAL -->
        <div class="bg-gray-900 border border-blue-800 rounded-xl p-4 ring-1 ring-blue-800/40">
            <p class="text-xs text-blue-400">Total Payments</p>
            <p id="payment-total" class="text-2xl font-semibold text-blue">0</p>
            <p class="text-xs text-blue-500 mt-1">
                $<span id="payment-total-amount" class="font-semibold">0.00</span> USD
            </p>
        </div>

        <!-- SUCCESS -->
        <div class="bg-gray-900 border border-emerald-500/20 rounded-xl p-4
                ring-1 ring-emerald-500/20">
            <p class="text-xs text-emerald-400">Success</p>
            <p id="payment-success-count" class="text-2xl font-semibold text-emerald-400">
                0
            </p>
            <p class="text-xs text-emerald-400/70 mt-1">
                $<span id="payment-success-amount" class="font-semibold">0.00</span> USD
            </p>
        </div>

        <!-- PENDING -->
        <div class="bg-gray-900 border border-amber-500/20 rounded-xl p-4
                ring-1 ring-amber-500/20">
            <p class="text-xs text-amber-400">Pending</p>
            <p id="payment-pending-count" class="text-2xl font-semibold text-amber-400">
                0
            </p>
            <p class="text-xs text-amber-400/70 mt-1">
                $<span id="payment-pending-amount" class="font-semibold">0.00</span> USD
            </p>
        </div>

        <!-- FAILED -->
        <div class="bg-gray-900 border border-gray-500/20 rounded-xl p-4
                ring-1 ring-red-500/20">
            <p class="text-xs text-gray-400">Failed</p>
            <p id="payment-failed-count" class="text-2xl font-semibold text-gray-400">
                0
            </p>
            <p class="text-xs text-gray-400/70 mt-1">
                $<span id="payment-failed-amount" class="font-semibold">0.00</span> USD
            </p>
        </div>

        <!-- CANCELED -->
        <div class="bg-gray-900 border border-red-500/20 rounded-xl p-4
                ring-1 ring-gray-500/20">
            <p class="text-xs text-red-400">Canceled</p>
            <p id="payment-cancel-count" class="text-2xl font-semibold text-red-300">
                0
            </p>
            <p class="text-xs text-red-400/70 mt-1">
                $<span id="payment-cancel-amount" class="font-semibold">0.00</span> USD
            </p>
        </div>

        <!-- LAST PAYMENT -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 ring-1 ring-gray-800/40">
            <p class="text-xs text-gray-400">Last Payment</p>
            <p id="payment-last-date" class="text-sm text-gray-300 mt-2">
                —
            </p>
        </div>

    </div>

    <!-- FILTER -->
    <div class="flex flex-wrap justify-between item-center mt-10">
        <div class="flex gap-3">
            <input
                    id="payment-search"
                    placeholder="Search keywords..."
                    class="px-4 py-2 rounded-lg bg-gray-800 border border-gray-700
                   text-sm text-gray-200">

            <select
                    id="payment-filter-status"
                    class="px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                <option value="">All status</option>
                <option value="0">Failed</option>
                <option value="1">Pending</option>
                <option value="2">Success</option>
                <option value="3">Cancel</option>
            </select>
            <select
                    id="payment-filter-gateway"
                    class="px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                <option value="">All gateways</option>
                <option value="1">Paypal</option>
                <option value="2">VNPay</option>
                <option value="3">MoMo</option>
            </select>
        </div>
        <div class="flex gap-3">
            <select
                    id="payment-sort-price"
                    class="px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                <option value="">Sort Price</option>
                <option value="1">Largest</option>
                <option value="2">Smallest</option>
            </select>
            <select
                    id="payment-sort-date"
                    class="px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                <option value="">Sort Date</option>
                <option value="1">Newest</option>
                <option value="2">Oldest</option>
            </select>
        </div>
        <div>
            <button id="btn-user-payment-filters-reset"
                    class="border border-blue-800 bg-gray-900 text-white hover:opacity-80
                    text-sm px-4 py-2 rounded-xl cursor-pointer">
                ⟳ Reset filters
            </button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="overflow-x-auto bg-gray-900 border border-gray-800 rounded-xl mt-5">
        <table class="min-w-full text-sm text-left text-gray-300 round-">
            <thead class="text-[10px] uppercase bg-gray-800 text-gray-400 text-center">
            <tr>
                <th class="px-4 py-3">N.O</th>
                <th class="px-4 py-3">Amount</th>
                <th class="px-4 py-3">Currency</th>
                <th class="px-4 py-3">Gateway</th>
                <th class="px-4 py-3">Type</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Created</th>
                <th class="px-4 py-3">Action</th>
            </tr>
            </thead>
            <tbody id="user-payment-table-body" class="divide-y divide-gray-800">
            <!-- ** Append table row data -->
            </tbody>
        </table>
    </div>

    <div
            id="user-payment-empty"
            class="hidden text-center text-gray-400 text-sm py-8">
        No payment records found.
    </div>

    <div
            id="user-details-payment-error"
            class="hidden rounded-lg border border-red-500 bg-red-950
               text-red-400 p-3 text-sm">
    </div>
</section>
