<section id="user-details-info" class="space-y-10">
    <!-- ===================== USER INFO ===================== -->
    <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

            <!-- ================= LEFT: USER INFO ================= -->
            <div class="lg:col-span-3">
                <div class="grid grid-cols-2 gap-x-8 gap-y-6">

                    <div>
                        <p class="text-xs text-gray-500">Phone</p>
                        <p id="user-details-phone" class="text-gray-200 font-medium"></p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500">Role</p>
                        <span
                                id="user-details-role"
                                class="inline-block mt-1 px-2 py-1 text-xs rounded
                                   bg-indigo-600 text-white font-medium">
                        </span>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500">Username</p>
                        <span
                                id="user-details-username"
                                class="text-gray-200 font-medium">
                        </span>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500">Date of Birth</p>
                        <p id="user-details-dob" class="text-gray-200 font-medium"></p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500">Created</p>
                        <p id="user-details-created" class="text-gray-300 text-xs"></p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500">Updated At</p>
                        <p id="user-details-updated" class="text-gray-300 text-xs"></p>
                    </div>

                </div>
            </div>

            <!-- ================= RIGHT: STATUS / SWITCH ================= -->
            <div class="space-y-4">

                <!-- WARNING -->
                <div
                        id="user-details-warning-bounder"
                        class="flex items-center justify-between
                           bg-gray-800 rounded-xl px-5 py-4">

                    <div>
                        <p class="text-sm font-medium text-gray-200">Warning</p>
                        <p class="text-xs text-gray-400">User has warning flag</p>
                    </div>

                    <label class="relative inline-flex items-center cursor-pointer">
                        <input id="user-details-warning" type="checkbox" class="sr-only peer">
                        <div
                                class="w-11 h-6 bg-gray-600 rounded-full
                                   peer-checked:bg-red-600 transition">
                        </div>
                        <div
                                class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full
                                   transition peer-checked:translate-x-5">
                        </div>
                    </label>
                </div>

            </div>
        </div>
    </section>

        <!-- STATUS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
            <div class="flex items-center justify-between bg-gray-800 rounded-xl px-5 py-4">
                <div>
                    <p class="text-sm font-medium text-gray-200">Active</p>
                    <p class="text-xs text-gray-400">Account status</p>
                </div>
                <label class="relative inline-flex items-center">
                    <input id="user-details-active" type="checkbox" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer-checked:bg-green-600 transition"></div>
                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full
                                        transition peer-checked:translate-x-5"></div>
                </label>
            </div>

            <div class="flex items-center justify-between bg-gray-800 rounded-xl px-5 py-4">
                <div>
                    <p class="text-sm font-medium text-gray-200">Public Profile</p>
                    <p class="text-xs text-gray-400">Visible to others</p>
                </div>
                <label class="relative inline-flex items-center">
                    <input id="user-details-public" type="checkbox" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-600 rounded-full peer-checked:bg-indigo-600 transition"></div>
                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full
                                        transition peer-checked:translate-x-5"></div>
                </label>
            </div>
        </div>
    </section>

    <!-- ===================== ROLE UPDATE ===================== -->
    <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-semibold text-white">Update Role</h3>

            <label class="relative inline-flex items-center cursor-pointer">
                <input id="user-role-edit-enable" type="checkbox" class="sr-only peer">
                <div class="w-10 h-5 bg-gray-600 rounded-full peer-checked:bg-indigo-600"></div>
                <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full
                                        transition peer-checked:translate-x-5"></div>
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-800 rounded-xl p-4">
                <p class="text-xs text-gray-400 mb-1">Current Role</p>
                <span
                        id="user-role-current"
                        class="inline-flex px-3 py-1 rounded-lg
                                       bg-indigo-600/20 text-indigo-400 border border-indigo-600/30
                                       text-sm font-semibold">
                            </span>
            </div>

            <div class="bg-gray-800 rounded-xl p-4">
                <p class="text-xs text-gray-400 mb-2">New Role</p>
                <select
                        id="user-role-select"
                        disabled
                        class="w-full px-4 py-2 rounded-lg bg-gray-900 border border-gray-700
                                       text-gray-200 text-sm disabled:opacity-40">
                    <option value="">-- Select role --</option>
                    <option value="2">Admin — Full system access</option>
                    <option value="3">User — Standard access</option>
                </select>
                <p class="mt-2 text-[11px] text-gray-500">
                    Changing role affects permissions immediately
                </p>
            </div>
        </div>

        <div class="flex justify-end mt-6">
            <button
                    id="user-role-btn-update"
                    disabled
                    class="px-6 py-2 rounded-xl bg-indigo-600 text-white font-medium
                                   hover:bg-indigo-700 disabled:bg-gray-600">
                Update Role
            </button>
        </div>
    </section>

    <!-- ===================== EDIT FORM ===================== -->
    <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg">
        <h2 class="text-xl font-semibold text-white mb-6">Edit User</h2>

        <form id="user-details-form-update" class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div>
                <label class="block text-gray-400 mb-2">First Name</label>
                <input id="user-details-firstName-update"
                       name="firstName"
                       class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
            </div>

            <div>
                <label class="block text-gray-400 mb-2">Last Name</label>
                <input id="user-details-lastName-update"
                       name="lastName"
                       class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
            </div>

            <div class="col-span-2">
                <label class="block text-gray-400 mb-2">Username</label>
                <input id="user-details-username-update"
                       name="username"
                       class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
            </div>

            <div class="col-span-2">
                <label class="block text-gray-400 mb-2">Phone Number</label>
                <input id="user-details-phone-update"
                       name="phone"
                       class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
            </div>

            <div class="col-span-2">
                <label class="block text-gray-400 mb-2">Date Of Birth</label>
                <input id="user-details-dob-update"
                       type="date"
                       name="dob"
                       class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
            </div>

            <div class="col-span-2 flex justify-end mt-6">
                <button
                        id="user-details-btn-update"
                        type="submit"
                        disabled
                        class="px-10 py-3 rounded-xl bg-gray-400 text-gray-700
                                       border border-gray-500 font-medium">
                    Save Changes
                </button>
            </div>
        </form>
    </section>
    <!-- ERROR -->
    <div
            id="user-details-update-error"
            class="hidden mt-6 rounded-lg border border-red-500
                           bg-red-50 dark:bg-red-950
                           text-red-700 dark:text-red-400
                           p-3 text-sm font-medium">
    </div>
</section>
