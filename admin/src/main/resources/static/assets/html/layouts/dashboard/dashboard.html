<div class="h-screen bg-gray-950 text-gray-200 flex pt-[75px] overflow-hidden relative">

    <!-- SIDEBAR -->
    <aside id="dashboard-aside"
           class="w-72 bg-gray-900 border-r border-gray-800
              p-6 flex flex-col overflow-y-auto
              [scrollbar-width:none]
              [&::-webkit-scrollbar]:hidden">

        <h1 class="text-2xl font-bold mb-8">View Ports</h1>
        <nav class="flex flex-col gap-3 text-gray-300 text-sm">
           <hr class="border-gray-700 opacity-50" />
            <a data-link href="/admin/dashboard"
               class="flex items-center gap-3 hover:text-white text-gray-200 font-semibold">
                <!-- Dashboard -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M3 12h7V3H3v9zm0 9h7v-7H3v7zm11 0h7v-9h-7v9zm0-18v7h7V3h-7z"/>
                </svg>
                Dashboard
            </a>
           <hr class="border-gray-700 opacity-50" />
            <div class="mt-4 text-xs uppercase text-gray-200 font-semibold">User Management</div>
            <a data-link href="/admin/users"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Users -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Users
            </a>

            <a data-link href="/admin/roles"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Roles / Shield -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M12 3l7 4v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V7l7-4z"/>
                </svg>
                Roles & Permissions
            </a>

            <a data-link href="/admin/subscriptions"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Subscriptions / Refresh -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M21 12a9 9 0 1 1-3-6.7"/>
                    <path d="M21 3v6h-6"/>
                </svg>
                Subscriptions
            </a>

            <a data-link href="/admin/fee"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Fee / Pricing -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <!-- coin -->
                    <circle cx="12" cy="12" r="9"/>
                    <!-- dollar -->
                    <path d="M12 7v10"/>
                    <path d="M9.5 9.5c0-1.4 5-1.4 5 0s-5 1.4-5 2.8 5 1.4 5 2.8-5 1.4-5 0"/>
                </svg>
                Fees
            </a>

            <a data-link href="/admin/contacts"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Contacts / ID -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M4 4h16v16H4z"/>
                    <path d="M9 9h6"/>
                    <path d="M9 13h6"/>
                </svg>
                User Contacts
            </a>
           <hr class="border-gray-700 opacity-50" />
            <div class="mt-4 text-xs uppercase text-gray-200 font-semibold">Content</div>
            <a data-link href="/admin/images"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Images -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
                Images
            </a>

            <a data-link href="/admin/categories"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Categories / Tag -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M20 12l-8 8-8-8 8-8 8 8z"/>
                </svg>
                Categories
            </a>

            <a data-link href="/admin/boards"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Boards -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="18"/>
                    <rect x="14" y="3" width="7" height="18"/>
                </svg>
                Boards
            </a>

            <a data-link href="/admin/comments"
               class="flex items-center gap-3 hover:text-white">
                <!-- Comments -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                Comments
            </a>
           <hr class="border-gray-700 opacity-50" />

            <div class="mt-4 text-xs uppercase text-gray-200 font-semibold">Moderation</div>

            <a data-link href="/admin/reports"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Reports -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M4 4h16v16H4z"/>
                    <path d="M8 12h8"/>
                    <path d="M8 16h5"/>
                </svg>
                Reports Center
            </a>

            <a data-link href="/admin/moderation"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Queue -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M4 6h16"/>
                    <path d="M4 12h16"/>
                    <path d="M4 18h10"/>
                </svg>
                Moderation Queue
            </a>
           <hr class="border-gray-700 opacity-50" />
            <div class="mt-4 text-xs uppercase text-gray-200 font-semibold">System</div>

            <a data-link href="/admin/system/server"
               class="flex items-center gap-3 hover:text-white text-gray-400">
                <!-- Server -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="6"/>
                    <rect x="3" y="15" width="18" height="6"/>
                    <path d="M7 6h.01M7 18h.01"/>
                </svg>
                Server Status
            </a>

           <hr class="border-gray-700 opacity-50" />
            <a data-link href="/admin/settings"
               class="flex items-center gap-3 hover:text-white mt-6 text-gray-200 font-semibold">
                <!-- Settings -->
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.5-0.2-.1a1.7 1.7 0 0 0-2 .3l-.3.2a1.7 1.7 0 0 0-.6 1.7V23h-4v-.3a1.7 1.7 0 0 0-.6-1.7l-.3-.2a1.7 1.7 0 0 0-2-.3l-.2.1-2-3.5.1-.1a1.7 1.7 0 0 0 .3-1.9l-.1-.3a1.7 1.7 0 0 0-1.5-.9H1v-4h.3a1.7 1.7 0 0 0 1.5-.9l.1-.3a1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-3.5.2.1a1.7 1.7 0 0 0 2-.3l.3-.2a1.7 1.7 0 0 0 .6-1.7V1h4v.3a1.7 1.7 0 0 0 .6 1.7l.3.2a1.7 1.7 0 0 0 2 .3l.2-.1 2 3.5-.1.1a1.7 1.7 0 0 0-.3 1.9l.1.3a1.7 1.7 0 0 0 1.5.9H23v4h-.3a1.7 1.7 0 0 0-1.5.9z"/>
                </svg>
                Settings
            </a>
        </nav>
    </aside>

    <button
            id="aside-toggle-btn"
            class="absolute top-20 left-0 z-50
               w-3 h-12
               flex items-center justify-center
               bg-gray-800 border border-gray-700
               rounded-r-xl
               shadow-lg
               text-gray-300
               hover:bg-gray-700
               transition-all duration-300">

        <svg id="aside-toggle-icon"
             class="w-2 h-4 transition-all duration-300"
             xmlns="http://www.w3.org/2000/svg"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 19l-7-7 7-7"/>
        </svg>
    </button>

    <!-- MAIN -->
    <main id="dashboard-area" class="flex-1 p-8 pb-2 overflow-y-auto
             [scrollbar-width:none]
             [&::-webkit-scrollbar]:hidden">
        <!-- ** Append dashboard content -->
    </main>
</div>
