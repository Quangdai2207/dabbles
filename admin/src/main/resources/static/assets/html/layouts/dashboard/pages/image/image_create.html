<section id="image-upload-page">
    <!-- Overlay -->
    <div id="image-upload-overlay"
         class="fixed inset-0 bg-black/60 z-40"></div>

    <!-- Modal -->
    <div id="image-upload-modal"
         class="fixed inset-0 z-50 flex items-center justify-center mt-8">

        <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-2xl shadow-2xl p-6">

            <!-- Header -->
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-semibold text-white">Upload New Image</h2>

                <button id="image-page-create-btn-close-upload"
                        class="px-2 py-2 bg-red-500 hover:bg-red-600 text-gray-200
                        hover:text-white text-[10px] font-semibold cursor-pointer leading-none
                        rounded-lg
               ">
                    Close
                </button>
            </div>

            <!-- Form -->
            <form id="image-upload-form" class="space-y-6">

                <!-- Upload Box -->
                <div>
                    <label class="text-sm text-gray-400">Image File</label>

                    <label for="upload-file"
                           class="mt-2 flex flex-col items-center justify-center w-full border-2 border-dashed border-gray-700 hover:border-gray-500 bg-gray-800/60 rounded-2xl cursor-pointer p-6 transition">

                        <div class="text-center space-y-2">
                            <span class="material-icons text-4xl text-gray-400">cloud_upload</span>
                            <p class="text-gray-300 text-sm">
                                Drag & drop or click to upload
                            </p>
                            <p class="text-xs text-gray-500">
                                JPG · PNG · WebP · Max 20MB
                            </p>
                        </div>
                        <input id="upload-file" type="file" accept="image/*" class="hidden" required />
                    </label>

                    <!-- Preview -->
                    <div id="upload-preview"
                         class="mt-3 hidden bg-gray-800 rounded-xl p-3 border border-gray-700">
                        <img id="preview-img" class="rounded-lg max-h-64 mx-auto object-contain" />
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="text-sm text-gray-400">Description</label>
                    <textarea id="upload-description"
                              name="description"
                              class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-xl px-3 py-2
                              text-sm outline-none focus:ring-2 focus:ring-blue-600"
                              rows="3"
                              placeholder="Write something about this image..."
                              required></textarea>
                </div>

                <!-- Categories -->
                <div>
                    <label class="text-sm text-gray-400">Categories</label>

                    <select id="upload-category-ids"
                            name="categoryId"
                            multiple
                            class="w-full h-32 bg-gray-800 text-sm text-gray-100
                           px-3 py-2 rounded-xl border border-gray-700
                           outline-none
                           focus:ring-2 focus:ring-blue-600 focus:border-blue-600
                           overflow-y-auto
                           [scrollbar-width:thin]
                           [scrollbar-color:#4b5563_#111827]

                           [&>option]:py-2
                           [&>option]:px-2
                           [&>option]:rounded-lg
                           [&>option]:m-0.5

                           [&>option:hover]:bg-gray-700
                           [&>option:hover]:cursor-pointer

                           [&>option:checked]:bg-blue-600/25
                           [&>option:checked]:text-blue-300
                           [&>option:checked]:font-medium
                           ">
                        <!-- Bạn có thể render list category bằng JS -->
                    </select>

                    <p class="text-xs text-gray-500 mt-1">
                        Hold <strong>Ctrl / Cmd</strong> to select more.
                    </p>
                </div>

                <!-- Footer -->
                <div class="flex justify-end gap-3 pt-3">
                    <button type="button" id="image-page-create-btn-cancel-upload"
                            class="px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-sm text-gray-200">
                        Cancel
                    </button>

                    <button type="submit" id="image-page-create-submit"
                            class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-sm text-white">
                        Upload
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
