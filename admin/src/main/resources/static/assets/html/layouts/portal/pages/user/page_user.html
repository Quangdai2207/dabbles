<section class="space-y-8" id="portal-users">

    <!-- HEADER -->
    <div>
        <h2 class="text-2xl font-bold text-white">User List</h2>
        <p class="text-gray-400 text-sm">View-only access. No editing permissions.</p>
    </div>

    <!-- FILTER BAR -->
    <div class="grid grid-cols-3 gap-4 bg-gray-900 p-4 rounded-xl border border-gray-800">
        <input id="search-user-lite" type="text"
               placeholder="Search users..."
               class="px-3 py-2 bg-gray-800 rounded-lg text-white w-full">

        <select id="filter-role-lite"
                class="px-3 py-2 bg-gray-800 rounded-lg text-white w-full">
            <option value="">Filter by Role</option>
            <option value="ADMIN">Admin</option>
            <option value="USER">User</option>
        </select>

        <button id="reset-lite"
                class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg">
            Reset
        </button>
    </div>

    <!-- TABLE -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
        <table class="w-full text-sm text-gray-700 dark:text-gray-300">
            <thead class="bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 text-xs uppercase">
            <tr>
                <th class="p-4 text-center">Name</th>
                <th class="p-4 text-center">Email</th>
                <th class="p-4 text-center">Role</th>
                <th class="p-4 text-center">Status</th>
                <th class="p-4 text-center">Actions</th>
            </tr>
            </thead>

            <tbody id="user-table-body">
            <!-- ROW -->
            <tr class="border-b border-gray-300 dark:border-gray-700
                   hover:bg-gray-50 dark:hover:bg-gray-700/40 transition">

                <td class="px-4 py-3 text-center">Dai tran</td>
                <td class="px-4 py-3 text-center">daitran@gmail.com</td>
                <td class="px-4 py-3 text-center">user</td>

                <td class="px-4 py-3 text-center">
                    <span class="text-green-600 dark:text-green-400 font-semibold">active</span>
                </td>

                <!-- ACTIONS -->
                <td class="px-4 py-3 flex items-center justify-center gap-2">
                    <button class="px-2 py-1 cursor-pointer bg-blue-600 hover:bg-blue-700
                               text-white text-xs rounded-lg shadow-sm
                               dark:bg-blue-500 dark:hover:bg-blue-600">
                        View
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</section>
