<div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-lg p-8 text-center">
    <!-- Header -->
    <h2 class="text-2xl font-bold text-white mb-4">Forgot Password</h2>
    <p class="text-gray-400 mb-6 text-sm">
        Enter your email address below and we'll send you a link to reset your password.
    </p>

    <!-- Form -->
    <form id="forgot-password-form" class="space-y-5">
        <div class="text-left">
            <label for="email" class="block text-gray-300 text-sm mb-1">Email Address</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="you@example.com"
                    class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            >
        </div>

        <button type="button" id="auth-submit-forget"
                class="w-full py-2 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-lg transition-colors">
            Send Reset Link
        </button>
    </form>

    <!-- Links -->
    <div class="mt-6 text-gray-400 text-sm">
        <a href="/auth/login" data-link id="auth-forgot-back" class="hover:text-white">Back to Login</a>
    </div>
    <!-- Error -->
    <div id="forgot-error"
         class="mt-4 text-left hidden rounded-lg border border-red-500 bg-red-50 dark:bg-red-950 text-red-700 dark:text-red-400 p-3 text-sm font-medium">
    </div>
</div>
