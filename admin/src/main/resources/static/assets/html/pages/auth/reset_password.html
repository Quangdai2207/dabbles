<div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-lg p-8 text-center">

    <!-- Header -->
    <h2 class="text-2xl font-bold text-white mb-4">Reset Your Password</h2>
    <p class="text-gray-400 mb-6 text-sm">
        Enter your new password below.
    </p>

    <!-- Form -->
    <form id="reset-password-form" class="space-y-5">

        <!-- New Password -->
        <div class="text-left">
            <label for="password" class="block text-gray-300 text-sm mb-1">New Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="••••••••"
                    class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white
                       border border-gray-700 focus:outline-none
                       focus:ring-2 focus:ring-red-500 focus:border-red-500"
            >
        </div>

        <!-- Confirm Password -->
        <div class="text-left">
            <label for="passwordConfirm" class="block text-gray-300 text-sm mb-1">Confirm New Password</label>
            <input
                    type="password"
                    id="passwordConfirm"
                    name="passwordConfirm"
                    required
                    placeholder="••••••••"
                    class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white
                       border border-gray-700 focus:outline-none
                       focus:ring-2 focus:ring-red-500 focus:border-red-500"
            >
        </div>

        <!-- Submit -->
        <button type="submit" id="btn-reset-password"
                class="w-full py-2 bg-red-500 hover:bg-red-600 text-white
                   font-semibold rounded-lg transition-colors">
            Reset Password
        </button>
    </form>

    <!-- Links -->
    <div class="mt-6 text-gray-400 text-sm">
        <a href="/auth/login" data-link class="hover:text-white">Back to Login</a>
    </div>

    <!-- Error -->
    <div id="reset-error"
         class="mt-4 text-left hidden rounded-lg border border-red-500 bg-red-50 dark:bg-red-950
            text-red-700 dark:text-red-400 p-3 text-sm font-medium">
    </div>

</div>
