<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<div id="auth-login" class="w-full max-w-md bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-xl">

    <h1 class="text-3xl font-bold text-white text-center mb-6">
        Welcome Back
    </h1>
    <p class="text-gray-400 text-center text-sm mb-8">
        Sign in to access the admin system
    </p>

    <form id="form-login" class="space-y-6">

        <!-- Username / Email -->
        <div>
            <label class="block text-gray-300 text-sm mb-2">Email</label>
            <input type="email"
                   class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:ring-2 ring-blue-500 outline-none"
                   placeholder="admin@example.com"
                   id="email"
                   name="email"
                   required>
        </div>

        <!-- Password -->
        <div>
            <label class="block text-gray-300 text-sm mb-2">Password</label>
            <input type="password"
                   class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:ring-2 ring-blue-500 outline-none"
                   placeholder="••••••••"
                   id="password"
                   name="password"
                   required>
        </div>

        <div id="turnstile-wrapper" class="w-75 mb-0 mt-5">
            <div id="cf-turnstile"
                 class="cf-turnstile"
                 data-sitekey="0x4AAAAAABHQ6Ou0TPewsB45"
                 data-callback="onTurnstileVerify"
                 data-expired-callback="onTurnstileExpire"
                 data-error-callback="onTurnstileError"
                 data-theme="dark"
                 data-size="flexible">
            </div>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between text-sm">
            <a href="/auth/forgot-password" data-link class="text-blue-400 hover:text-blue-300">Forgot password?</a>
        </div>

        <!-- Button -->
        <button type="submit" id="btn-login"
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold shadow transition">
            Sign in
        </button>
    </form>

    <!-- Error -->
    <div id="login-error"
         class="mt-4 hidden rounded-lg border border-red-500 bg-red-50 dark:bg-red-950 text-red-700 dark:text-red-400 p-3 text-sm font-medium">
    </div>
</div>
