name: dabble
description: "dabble project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  cloudflare_turnstile: ^3.6.2
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_displaymode: ^0.7.0
  flutter_dotenv: ^6.0.0
  flutter_image_compress: ^2.4.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  google_sign_in: ^7.2.0
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.5.0
  lucide_icons_flutter: ^3.1.9
  path: any
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  photo_view: ^0.15.0
  pretty_dio_logger: ^1.3.1
  riverpod: any
  riverpod_annotation: ^2.3.5
  stomp_dart_client: 3.0.1
  toastification: ^3.0.3
  url_launcher: ^6.3.2


dev_dependencies:
  build_runner: ^2.10.4
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/d-logo-2.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/d-logo-2.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Comfortaa
      fonts:
        - asset: assets/fonts/Comfortaa-Light.ttf
          weight: 300
        - asset: assets/fonts/Comfortaa-Regular.ttf
          weight: 400
        - asset: assets/fonts/Comfortaa-Medium.ttf
          weight: 500
        - asset: assets/fonts/Comfortaa-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Comfortaa-Bold.ttf
          weight: 700
